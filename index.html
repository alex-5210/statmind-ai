<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StatMind Analytics Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    min-height:100vh;
    color:white;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:45px;
    color:#38bdf8;
}

.header p{
    color:#cbd5e1;
    margin-top:10px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:25px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    animation:fade 0.7s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#e2e8f0;
}

input,select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:#1e293b;
    color:white;
    font-size:16px;
}

input:focus,select:focus{
    outline:none;
    border:2px solid #38bdf8;
}

.buttons{
    display:flex;
    gap:15px;
    margin-top:20px;
}

button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
}

.save-btn{
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    color:white;
}

.clear-btn{
    background:linear-gradient(90deg,#ef4444,#dc2626);
    color:white;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.stat-box{
    background:#0f172a;
    border-radius:20px;
    padding:20px;
    text-align:center;
    transition:0.3s;
}

.stat-box:hover{
    transform:scale(1.03);
}

.stat-box h3{
    color:#38bdf8;
    margin-bottom:10px;
}

.stat-box p{
    font-size:30px;
    font-weight:bold;
}

.analysis{
    margin-top:25px;
    background:#0f172a;
    padding:20px;
    border-radius:20px;
    line-height:1.8;
}

canvas{
    margin-top:30px;
    background:white;
    border-radius:20px;
    padding:15px;
}

.table-container{
    overflow-x:auto;
    margin-top:30px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0284c7;
    padding:12px;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.badge{
    display:inline-block;
    padding:10px 15px;
    border-radius:30px;
    background:#22c55e;
    margin-top:15px;
    font-weight:bold;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#94a3b8;
}

@media(max-width:700px){

    .buttons{
        flex-direction:column;
    }

    .header h1{
        font-size:34px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1><i class="fa-solid fa-chart-line"></i> StatMind Analytics Pro</h1>
        <p>AI-Powered Student Productivity Dashboard</p>
    </div>

    <div class="card">

        <div class="grid">

            <div>
                <label><i class="fa-solid fa-bed"></i> Hours of Sleep</label>
                <input type="number" id="sleep" placeholder="Example: 7">
            </div>

            <div>
                <label><i class="fa-solid fa-book"></i> Hours of Study</label>
                <input type="number" id="study" placeholder="Example: 4">
            </div>

            <div>
                <label><i class="fa-solid fa-mobile-screen"></i> Social Media Usage</label>
                <input type="number" id="social" placeholder="Example: 3">
            </div>

            <div>
                <label><i class="fa-solid fa-graduation-cap"></i> Grade</label>
                <input type="number" id="grade" placeholder="Example: 8.5">
            </div>

            <div>
                <label><i class="fa-solid fa-bolt"></i> Productivity</label>
                <select id="productivity">
                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>
                </select>
            </div>

            <div>
                <label><i class="fa-solid fa-face-smile"></i> Mood</label>
                <select id="mood">
                    <option>Happy</option>
                    <option>Neutral</option>
                    <option>Stressed</option>
                </select>
            </div>

        </div>

        <div class="buttons">
            <button class="save-btn" onclick="saveData()">
                <i class="fa-solid fa-floppy-disk"></i>
                Save Data
            </button>

            <button class="clear-btn" onclick="clearData()">
                <i class="fa-solid fa-trash"></i>
                Clear Data
            </button>
        </div>

    </div>

    <div class="card">

        <h2><i class="fa-solid fa-chart-pie"></i> Dashboard</h2>

        <div class="stats">

            <div class="stat-box">
                <h3>Average Sleep</h3>
                <p id="avgSleep">0</p>
            </div>

            <div class="stat-box">
                <h3>Average Study</h3>
                <p id="avgStudy">0</p>
            </div>

            <div class="stat-box">
                <h3>Average Grade</h3>
                <p id="avgGrade">0</p>
            </div>

            <div class="stat-box">
                <h3>Correlation</h3>
                <p id="correlation">0</p>
            </div>

        </div>

        <div class="analysis" id="analysis">
            No analysis available yet.
        </div>

        <div class="badge" id="achievement">
            🎯 Start adding data!
        </div>

        <canvas id="gradesChart"></canvas>

        <canvas id="habitsChart"></canvas>

        <div class="table-container">

            <table id="dataTable">

                <thead>
                    <tr>
                        <th>#</th>
                        <th>Sleep</th>
                        <th>Study</th>
                        <th>Social</th>
                        <th>Grade</th>
                        <th>Productivity</th>
                        <th>Mood</th>
                    </tr>
                </thead>

                <tbody></tbody>

            </table>

        </div>

    </div>

    <div class="footer">
        StatMind Analytics Pro © 2026
    </div>

</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

    let studentData =
        JSON.parse(localStorage.getItem("studentData")) || [];

    const gradesChart = new Chart(
        document.getElementById("gradesChart"),
        {
            type:'line',
            data:{
                labels:[],
                datasets:[{
                    label:'Grades Trend',
                    data:[],
                    borderColor:'#3b82f6',
                    backgroundColor:'rgba(59,130,246,0.2)',
                    borderWidth:3,
                    fill:true,
                    tension:0.3
                }]
            },
            options:{
                responsive:true
            }
        }
    );

    const habitsChart = new Chart(
        document.getElementById("habitsChart"),
        {
            type:'bar',
            data:{
                labels:['Sleep','Study','Social'],
                datasets:[{
                    label:'Average Hours',
                    data:[0,0,0],
                    backgroundColor:[
                        '#3b82f6',
                        '#22c55e',
                        '#ef4444'
                    ]
                }]
            },
            options:{
                responsive:true,
                scales:{
                    y:{
                        beginAtZero:true
                    }
                }
            }
        }
    );

    window.saveData = function(){

        let sleep = parseFloat(document.getElementById("sleep").value);
        let study = parseFloat(document.getElementById("study").value);
        let social = parseFloat(document.getElementById("social").value);
        let grade = parseFloat(document.getElementById("grade").value);

        let productivity = document.getElementById("productivity").value;
        let mood = document.getElementById("mood").value;

        if(
            isNaN(sleep) ||
            isNaN(study) ||
            isNaN(social) ||
            isNaN(grade)
        ){
            alert("Complete all fields");
            return;
        }

        studentData.push({
            sleep,
            study,
            social,
            grade,
            productivity,
            mood
        });

        localStorage.setItem(
            "studentData",
            JSON.stringify(studentData)
        );

        updateUI();
        clearInputs();

    }

    function updateUI(){

        if(studentData.length === 0){
            return;
        }

        let totalSleep = 0;
        let totalStudy = 0;
        let totalGrade = 0;
        let totalSocial = 0;

        studentData.forEach(item=>{
            totalSleep += item.sleep;
            totalStudy += item.study;
            totalGrade += item.grade;
            totalSocial += item.social;
        });

        let avgSleep = (totalSleep/studentData.length).toFixed(1);
        let avgStudy = (totalStudy/studentData.length).toFixed(1);
        let avgGrade = (totalGrade/studentData.length).toFixed(1);
        let avgSocial = (totalSocial/studentData.length).toFixed(1);

        document.getElementById("avgSleep").innerText = avgSleep;
        document.getElementById("avgStudy").innerText = avgStudy;
        document.getElementById("avgGrade").innerText = avgGrade;

        updateCharts();
        updateTable();
        generateAnalysis(avgSleep,avgStudy,avgGrade,avgSocial);
        calculateCorrelation();
        generateAchievement(avgGrade);

    }

    function updateCharts(){

        gradesChart.data.labels =
            studentData.map((_,i)=>`Day ${i+1}`);

        gradesChart.data.datasets[0].data =
            studentData.map(item=>item.grade);

        gradesChart.update();

        let avgSleep =
            studentData.reduce((a,b)=>a+b.sleep,0)
            / studentData.length;

        let avgStudy =
            studentData.reduce((a,b)=>a+b.study,0)
            / studentData.length;

        let avgSocial =
            studentData.reduce((a,b)=>a+b.social,0)
            / studentData.length;

        habitsChart.data.datasets[0].data = [
            avgSleep.toFixed(1),
            avgStudy.toFixed(1),
            avgSocial.toFixed(1)
        ];

        habitsChart.update();

    }

    function generateAnalysis(
        avgSleep,
        avgStudy,
        avgGrade,
        avgSocial
    ){

        let text = "";

        if(avgSleep < 6){
            text += "⚠️ Low sleep detected.<br><br>";
        }else{
            text += "✅ Healthy sleep habits.<br><br>";
        }

        if(avgStudy >= 4){
            text += "📚 Excellent study consistency.<br><br>";
        }else{
            text += "📖 Increase study hours.<br><br>";
        }

        if(avgSocial > 5){
            text += "📱 High social media usage may reduce productivity.<br><br>";
        }

        if(avgGrade >= 8){
            text += "🏆 Strong academic performance.<br><br>";
        }else{
            text += "💡 Improve study strategy.<br><br>";
        }

        text += "🤖 AI Prediction: Higher study hours are associated with better grades.";

        document.getElementById("analysis").innerHTML = text;

    }

    function calculateCorrelation(){

        if(studentData.length < 2){
            return;
        }

        let study = studentData.map(d=>d.study);
        let grade = studentData.map(d=>d.grade);

        let n = study.length;

        let sumX = study.reduce((a,b)=>a+b,0);
        let sumY = grade.reduce((a,b)=>a+b,0);

        let sumXY = 0;
        let sumX2 = 0;
        let sumY2 = 0;

        for(let i=0;i<n;i++){
            sumXY += study[i]*grade[i];
            sumX2 += study[i]*study[i];
            sumY2 += grade[i]*grade[i];
        }

        let correlation =
            (
                n*sumXY - sumX*sumY
            ) /
            Math.sqrt(
                (n*sumX2 - sumX**2)
                *
                (n*sumY2 - sumY**2)
            );

        document.getElementById("correlation")
            .innerText = correlation.toFixed(2);

    }

    function generateAchievement(avgGrade){

        let achievement = "🎯 Keep tracking your habits!";

        if(avgGrade >= 9){
            achievement = "🏆 Academic Master";
        }
        else if(avgGrade >= 8){
            achievement = "⭐ Excellent Student";
        }
        else if(avgGrade >= 7){
            achievement = "📚 Good Progress";
        }

        document.getElementById("achievement")
            .innerHTML = achievement;

    }

    function updateTable(){

        let tbody = document.querySelector(
            "#dataTable tbody"
        );

        tbody.innerHTML = "";

        studentData.forEach((item,index)=>{

            tbody.innerHTML += `

            <tr>
                <td>${index+1}</td>
                <td>${item.sleep}</td>
                <td>${item.study}</td>
                <td>${item.social}</td>
                <td>${item.grade}</td>
                <td>${item.productivity}</td>
                <td>${item.mood}</td>
            </tr>

            `;

        });

    }

    function clearInputs(){

        document.getElementById("sleep").value = "";
        document.getElementById("study").value = "";
        document.getElementById("social").value = "";
        document.getElementById("grade").value = "";

    }

    window.clearData = function(){

        if(confirm("Delete all data?")){

            localStorage.removeItem("studentData");
            location.reload();

        }

    }

    updateUI();

});

</script>

</body>
</html>
